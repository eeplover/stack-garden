spring:
  application:
    name: knowledge-rag
  datasource:
    url: jdbc:postgresql://localhost:5433/knowledge_rag
    username: dev
    password: devpassword
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1536

server:
  port: 8080