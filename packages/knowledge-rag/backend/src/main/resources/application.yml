spring:
  application:
    name: knowledge-rag
  datasource:
    url: jdbc:postgresql://localhost:5433/knowledge_rag
    username: dev
    password: devpassword
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  ai:
    ollama:
      base-url: http://localhost:11434
      init:
        pull-model-strategy: when_missing
      chat:
        options:
          model: qwen2:7b
          temperature: 0.7
      embedding:
        options:
          model: nomic-embed-text
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 768

server:
  port: 8080